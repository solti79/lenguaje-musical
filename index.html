<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fundamentos Básicos del Lenguaje Musical</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    
    <style>
        /* ESTILOS */
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; touch-action: manipulation; }
        #contenedor-app { background: white; width: 95%; max-width: 850px; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; position: relative; margin: 10px; }
        h1 { color: #2c3e50; font-size: 1.8rem; margin-bottom: 20px; }
        #seccion-registro { margin-bottom: 20px; padding: 15px; background: #ebf5fb; border-radius: 15px; border: 2px solid #3498db; }
        #nombre-alumno { padding: 12px; font-size: 1.1rem; border-radius: 8px; border: 1px solid #ccc; width: 80%; text-align: center; }
        .cuadros-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px;}
        .tarjeta { background-color: #5dade2; color: white; width: 140px; height: 180px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; padding: 10px; box-sizing: border-box; }
        .icono { font-size: 50px; height: 70px; display: flex; align-items: center; justify-content: center; }
        .icono-f { font-family: 'Times New Roman', Times, serif !important; font-weight: bold !important; font-style: italic !important; font-size: 60px !important; }
        .tarjeta span { font-weight: bold; font-size: 1.1rem; }
        #area-juego { width: 100%; }
        #pentagrama { background: #fff; border: 3px solid #3498db; border-radius: 20px; width: 100%; min-height: 180px; display: flex; justify-content: center; align-items: center; margin: 10px auto; overflow: hidden; }
        .btn-respuesta { background: #3498db; color: white; border: none; padding: 12px 15px; margin: 5px; border-radius: 10px; font-size: 1rem; font-weight: bold; }
        .cronometro { font-size: 3rem; color: #e74c3c; font-weight: bold; }
        
        /* Estilos Drag & Drop Móvil */
        .zona-drop-container { display: flex; gap: 8px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .hueco { width: 60px; height: 60px; border: 3px dashed #3498db; border-radius: 12px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; }
        .pieza { width: 55px; height: 55px; background: #5dade2; color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: grab; font-size: 30px !important; touch-action: none; user-select: none; }
        .pieza.dragging { opacity: 0.5; transform: scale(1.1); }
        .img-ritmo { max-height: 100px; }
        .simbolo-suma { font-size: 1.5rem; font-weight: bold; color: #3498db; }
    </style>
</head>
<body>

    <div id="contenedor-app">
        <div id="menu-inicio">
            <h1>Lenguaje Musical</h1>
            <div id="seccion-registro">
                <input type="text" id="nombre-alumno" placeholder="Tu nombre">
            </div>
            <div class="cuadros-container">
                <div class="tarjeta" onclick="intentarEntrar('Ritmo')"><div class="icono">♩</div><span>RITMO</span></div>
                <div class="tarjeta" onclick="intentarEntrar('Melodía')"><div class="icono">𝄞</div><span>MELODÍA</span></div>
                <div class="tarjeta" onclick="intentarEntrar('Dinámicas')"><div class="icono" class="icono-f"><i>f</i></div><span>DINÁMICAS</span></div>
            </div>
        </div>

        <div id="pantalla-actividad" style="display:none;">
            <div style="display:flex; justify-content: space-between; margin-bottom:15px;">
                <button onclick="volver()" style="padding:10px;">⬅</button>
                <select id="selector-nivel" onchange="ajustarTiemposSelector()"></select>
            </div>
            <div id="pantalla-previa">
                <h2 id="titulo-modulo"></h2>
                <button class="btn-inicio" onclick="comenzarActividad()" style="padding:15px 30px; background:#5dade2; color:white; border:none; border-radius:10px; font-weight:bold;">COMENZAR</button>
            </div>
            <div id="area-juego" style="display:none;">
                <div class="cronometro" id="tiempo">20</div>
                <div id="contador">Aciertos: 0</div>
                <div id="pentagrama"></div>
                <div id="opciones"></div>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzy5sc0_ijmg0Ch50LYrAzfKYaxuW5qHL_iBq3GaiLYkLmokIwRmMEFF5wh_vuYT60YPQ/exec";
        let alumnoActual = "", moduloActual = "", tiempoRestante, timer, notaActual, itemsRestantes, aciertos, errores;
        let rondaDrag = 1;

        const RITMO_NOTAS = [
            { id: 'negra', n: 'Negra', img: 'negra.png', v: 1 },
            { id: 'blanca', n: 'Blanca', img: 'blanca.png', v: 2 },
            { id: 'redonda', n: 'Redonda', img: 'redonda.png', v: 4 }
        ];

        const DATA_DINAMICAS = [{s:'p', n:'Piano'}, {s:'mp', n:'Mezzopiano'}, {s:'mf', n:'Mezzoforte'}, {s:'f', n:'Forte'}];

        function intentarEntrar(m) {
            const n = document.getElementById('nombre-alumno').value.trim();
            if (!n) { alert("Nombre, por favor"); return; }
            alumnoActual = n; moduloActual = m;
            const sel = document.getElementById('selector-nivel');
            sel.innerHTML = m === 'Ritmo' ? 
                `<option value="30">Básico</option><option value="25">Intermedio</option>` :
                `<option value="25">Básico</option><option value="25">Intermedio</option><option value="20">Avanzado</option>`;
            document.getElementById('menu-inicio').style.display = 'none';
            document.getElementById('pantalla-actividad').style.display = 'block';
            document.getElementById('titulo-modulo').innerText = m;
        }

        function ajustarTiemposSelector() { document.getElementById('tiempo').innerText = document.getElementById('selector-nivel').value; }

        function comenzarActividad() {
            document.getElementById('pantalla-previa').style.display = 'none';
            document.getElementById('area-juego').style.display = 'block';
            aciertos = 0; errores = 0; rondaDrag = 1;
            const nIdx = document.getElementById('selector-nivel').selectedIndex;
            
            if (moduloActual === 'Dinámicas') {
                if (nIdx === 1) itemsRestantes = [1];
                else itemsRestantes = [...DATA_DINAMICAS].sort(() => Math.random() - 0.5);
            } else {
                itemsRestantes = [...RITMO_NOTAS].sort(() => Math.random() - 0.5);
            }
            
            tiempoRestante = parseInt(document.getElementById('selector-nivel').value);
            proximaRonda();
            timer = setInterval(() => {
                tiempoRestante--;
                document.getElementById('tiempo').innerText = tiempoRestante;
                if(tiempoRestante <= 0) finalizarYEnviar("Tiempo");
            }, 1000);
        }

        function proximaRonda() {
            const pen = document.getElementById("pentagrama");
            const ops = document.getElementById("opciones");
            pen.innerHTML = ""; ops.innerHTML = ""; // Limpieza total
            const nIdx = document.getElementById('selector-nivel').selectedIndex;

            if (itemsRestantes.length === 0) { finalizarYEnviar("Fin"); return; }

            if (moduloActual === 'Dinámicas' && nIdx === 1) {
                generarDragDrop();
            } else if (moduloActual === 'Dinámicas') {
                let it = itemsRestantes.pop(); notaActual = it.s;
                let div = document.createElement('div');
                div.className = "icono-f";
                div.innerText = it.s;
                pen.appendChild(div);
                
                DATA_DINAMICAS.forEach(d => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-respuesta';
                    btn.innerText = d.n;
                    btn.onclick = () => { if(d.s === notaActual) { aciertos++; proximaRonda(); } };
                    ops.appendChild(btn);
                });
            } else {
                // Lógica de Ritmo simplificada para prueba
                let it = itemsRestantes.pop(); notaActual = it.id;
                pen.innerHTML = `<img src="${it.img}" class="img-ritmo">`;
                RITMO_NOTAS.forEach(r => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-respuesta';
                    btn.innerText = r.n;
                    btn.onclick = () => { if(r.id === notaActual) { aciertos++; proximaRonda(); } };
                    ops.appendChild(btn);
                });
            }
            document.getElementById('contador').innerText = `Aciertos: ${aciertos}`;
        }

        // --- SOPORTE DRAG & DROP TÁCTIL ---
        function generarDragDrop() {
            const pen = document.getElementById("pentagrama");
            const ops = document.getElementById("opciones");
            pen.innerHTML = `<div style="font-size:0.9rem">Ordena de Suave a Fuerte:<br><div class="zona-drop-container">
                <div class="hueco" id="h0"></div><div class="hueco" id="h1"></div>
                <div class="hueco" id="h2"></div><div class="hueco" id="h3"></div>
            </div></div>`;
            
            ops.innerHTML = `<div id="piezas" style="display:flex; gap:5px; justify-content:center;"></div>`;
            
            [...DATA_DINAMICAS].sort(()=>Math.random()-0.5).forEach(d => {
                const p = document.createElement('div');
                p.className='pieza icono-f'; p.innerText=d.s; p.id="p-"+d.s;
                
                // Eventos Táctiles
                p.addEventListener('touchstart', handleTouchStart, false);
                p.addEventListener('touchmove', handleTouchMove, false);
                p.addEventListener('touchend', handleTouchEnd, false);
                
                document.getElementById('piezas').appendChild(p);
            });
        }

        let activePiece = null;
        function handleTouchStart(e) { activePiece = e.target; activePiece.classList.add('dragging'); }
        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            activePiece.style.position = 'fixed';
            activePiece.style.left = (touch.clientX - 25) + 'px';
            activePiece.style.top = (touch.clientY - 25) + 'px';
        }
        function handleTouchEnd(e) {
            const touch = e.changedTouches[0];
            activePiece.classList.remove('dragging');
            activePiece.style.position = 'static';
            
            const dropZone = document.elementFromPoint(touch.clientX, touch.clientY);
            const hueco = dropZone ? dropZone.closest('.hueco') : null;
            
            if (hueco && hueco.children.length === 0) {
                hueco.appendChild(activePiece);
                validarOrden();
            } else {
                document.getElementById('piezas').appendChild(activePiece);
            }
        }

        function validarOrden() {
            const huecos = document.querySelectorAll('.hueco');
            const llenos = Array.from(huecos).filter(h => h.children.length > 0);
            if(llenos.length === 4) {
                const res = Array.from(huecos).map(h => h.firstChild.innerText);
                if(JSON.stringify(res) === JSON.stringify(['p', 'mp', 'mf', 'f'])) {
                    aciertos++; alert("¡Perfecto!"); finalizarYEnviar("Completado");
                } else {
                    alert("Orden incorrecto, intenta de nuevo");
                    proximaRonda();
                }
            }
        }

        function volver() { clearInterval(timer); location.reload(); }
        function finalizarYEnviar(e) { clearInterval(timer); alert("Fin: " + aciertos + " aciertos"); volver(); }
    </script>
</body>
</html>
